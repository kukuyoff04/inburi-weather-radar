<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เรดาร์ฝนอินทร์บุรี - Alieninburi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #222; font-family: 'Tahoma', sans-serif; color: white; }
        .header { text-align: center; padding: 12px; background: #1a1a1a; border-bottom: 2px solid #3498db; }
        #map { width: 100vw; height: calc(100vh - 58px); }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin: 0; color: #3498db;">🛰️ เรดาร์ฝนอินทร์บุรี Real-time</h3>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. สร้างแผนที่ เล็งไปที่อินทร์บุรี (ซูมระดับ 10)
        var map = L.map('map').setView([14.9833, 100.3333], 10);

        // 2. ใช้แผนที่ฐานแบบสว่างเพื่อให้เห็นชัดๆ
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. ดึงข้อมูลเรดาร์ฝน
        fetch('https://api.rainviewer.com/public/weather-maps.json')
            .then(res => res.json())
            .then(data => {
                var latestTime = data.radar.past[data.radar.past.length - 1].time;
                
                // --- จุดที่ทำให้หาย Error 100% ---
                var radarLayer = L.tileLayer('https://tilecache.rainviewer.com/v2/radar/' + latestTime + '/256/{z}/{x}/{y}/2/1_1.png', {
                    opacity: 0.6,
                    transparent: true,
                    maxNativeZoom: 6, // สำคัญที่สุด! ถ้าซูมลึกกว่าระดับ 6 ให้ขยายภาพเดิมเอา ไม่ต้องดึงใหม่ (ป้องกัน Not Supported)
                    maxZoom: 18      // แต่ตัวแผนที่ยังซูมเข้าออกได้ปกติ
                });

                radarLayer.addTo(map);
            });

        // ปักหมุดอินทร์บุรี
        L.marker([14.9833, 100.3333]).addTo(map).bindPopup('<b>อ.อินทร์บุรี</b>').openPopup();
    </script>
</body>
</html>
