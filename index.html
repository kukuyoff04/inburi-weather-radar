<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เรดาร์สภาพอากาศ - อินทร์บุรี</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f9; font-family: sans-serif; }
        .header { text-align: center; padding: 15px; background: #2c3e50; color: white; }
        /* ทำให้แผนที่แสดงผลเต็มจอแบบสวยงาม */
        #weather-map { width: 100vw; height: calc(100vh - 60px); z-index: 1;} 
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin: 0;">📡 เรดาร์กลุ่มฝนแบบเรียลไทม์ (อ.อินทร์บุรี)</h3>
    </div>
    <div id="weather-map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // สร้างแผนที่ เล็งพิกัดไปที่ อ.อินทร์บุรี จ.สิงห์บุรี (ซูมระดับ 9)
        var map = L.map('weather-map').setView([14.9833, 100.3333], 9); 

        // ใส่แผนที่ถนน
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // ดึง API เรดาร์ฝนจาก RainViewer
        fetch('https://api.rainviewer.com/public/weather-maps.json')
            .then(response => response.json())
            .then(data => {
                var latestTime = data.radar.past[data.radar.past.length - 1].time;
                var host = data.host; 

                // *** จุดสำคัญที่แก้ไข ***
                // เปลี่ยนโครงสร้าง URL ให้ดึงภาพขนาด 512px แทน 256px
                // https://{host}/v2/radar/{time}/512/{z}/{x}/{y}/2/1_1.png
                var radarUrl = `${host}/v2/radar/${latestTime}/512/{z}/{x}/{y}/2/1_1.png`;

                // และต้องระบุ tileSize เป็น 512 ด้วย
                L.tileLayer(radarUrl, {
                    tileSize: 512,  
                    opacity: 0.7,
                    transparent: true,
                    attribution: '© RainViewer'
                }).addTo(map);
                
                console.log("โหลดเรดาร์สำเร็จจาก:", radarUrl);
            })
            .catch(error => {
                console.error('เกิดข้อผิดพลาดในการดึงข้อมูลเรดาร์ฝน:', error);
                alert("ไม่สามารถดึงข้อมูลเรดาร์ฝนได้ในขณะนี้ กรุณาลองใหม่ภายหลัง");
            });
    </script>

</body>
</html>
