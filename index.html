<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เรดาร์ฝนอินทร์บุรี - Alieninburi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; font-family: sans-serif; color: white; }
        .header { text-align: center; padding: 10px; background: #2c3e50; }
        #weather-map { width: 100vw; height: calc(100vh - 55px); background: #242424; }
    </style>
</head>
<body>

    <div class="header">
        <h4 style="margin: 0;">🛰️ เรดาร์ฝนเรียลไทม์ อ.อินทร์บุรี</h4>
    </div>
    <div id="weather-map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. ตั้งค่าแผนที่: ล็อกซูมไว้ที่ 6-10 (ช่วงที่เรดาร์ชัดที่สุดและไม่ขึ้น Error)
        var map = L.map('weather-map', {
            minZoom: 4,
            maxZoom: 10
        }).setView([14.9833, 100.3333], 7); 

        // 2. แผนที่ฐานแบบมืด (เพื่อให้เห็นสีฝนชัดๆ)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '©OpenStreetMap'
        }).addTo(map);

        // 3. ดึงข้อมูลเรดาร์
        fetch('https://api.rainviewer.com/public/weather-maps.json')
            .then(res => res.json())
            .then(data => {
                var latestTime = data.radar.past[data.radar.past.length - 1].time;
                
                // ใช้ URL มาตรฐานที่รองรับทุก Zoom ในช่วง 4-10
                // โครงสร้าง: /v2/radar/{time}/256/{z}/{x}/{y}/2/1_1.png
                var radarLayer = L.tileLayer('https://tilecache.rainviewer.com/v2/radar/' + latestTime + '/256/{z}/{x}/{y}/2/1_1.png', {
                    opacity: 0.8,
                    transparent: true,
                    tileSize: 256,
                    zoomOffset: 0
                });

                radarLayer.addTo(map);
            });
            
        // ปักหมุดตำแหน่ง อ.อินทร์บุรี ให้เห็นชัดๆ
        L.marker([14.9833, 100.3333]).addTo(map)
            .bindPopup('อ.อินทร์บุรี อยู่ตรงนี้')
            .openPopup();
    </script>
</body>
</html>
