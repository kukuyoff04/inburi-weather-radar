<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เรดาร์สภาพอากาศ - อินทร์บุรี</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f9; font-family: sans-serif; }
        .header { text-align: center; padding: 15px; background: #2c3e50; color: white; }
        /* ทำให้แผนที่แสดงผลเต็มจอแบบสวยงาม */
        #weather-map { width: 100vw; height: calc(100vh - 60px); } 
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin: 0;">📡 เรดาร์กลุ่มฝนแบบเรียลไทม์ (อ.อินทร์บุรี)</h3>
    </div>
    <div id="weather-map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // สร้างแผนที่ เล็งพิกัดไปที่ อ.อินทร์บุรี จ.สิงห์บุรี
        var map = L.map('weather-map').setView([14.9833, 100.3333], 10);

        // ใส่แผนที่ถนน
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // ดึง API เรดาร์ฝนแบบแม่นยำ 100% จาก RainViewer
        fetch('https://api.rainviewer.com/public/weather-maps.json')
            .then(response => response.json())
            .then(data => {
                var latestTime = data.radar.past[data.radar.past.length - 1].time;
                
                L.tileLayer(`https://tilecache.rainviewer.com/v2/radar/${latestTime}/256/{z}/{x}/{y}/2/1_1.png`, {
                    opacity: 0.7,
                    transparent: true
                }).addTo(map);
            })
            .catch(error => console.error('ดึงข้อมูลไม่ได้:', error));
    </script>

</body>
</html>
