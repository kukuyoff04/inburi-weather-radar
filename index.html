<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เรดาร์สภาพอากาศ - อินทร์บุรี</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f9; font-family: sans-serif; }
        .header { text-align: center; padding: 15px; background: #2c3e50; color: white; }
        /* ทำให้แผนที่แสดงผลเต็มจอแบบสวยงาม */
        #weather-map { width: 100vw; height: calc(100vh - 60px); z-index: 1;} 
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin: 0;">📡 เรดาร์กลุ่มฝนแบบเรียลไทม์ (อ.อินทร์บุรี)</h3>
    </div>
    <div id="weather-map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // สร้างแผนที่ เล็งพิกัดไปที่ อ.อินทร์บุรี จ.สิงห์บุรี
        var map = L.map('weather-map').setView([14.9833, 100.3333], 8); // ปรับ Zoom Level เป็น 8 เพื่อให้เห็นกว้างขึ้นและรองรับภาพเรดาร์ได้ดีกว่า

        // ใส่แผนที่ถนน
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- เริ่มต้นการดึง API เรดาร์ฝน (อัปเดตใหม่) ---
        fetch('https://api.rainviewer.com/public/weather-maps.json')
            .then(response => response.json())
            .then(data => {
                // หาเวลาล่าสุดที่มีข้อมูลเรดาร์
                var latestTime = data.radar.past[data.radar.past.length - 1].time;
                var host = data.host; // ดึงชื่อ host จาก API มาใช้โดยตรงเพื่อความเสถียร

                // สร้าง URL ใหม่ให้ถูกต้องตามโครงสร้างล่าสุดของ RainViewer
                // โครงสร้าง: https://{host}/v2/radar/{time}/{size}/{z}/{x}/{y}/{color}/{smooth}_{snow}.png
                var radarUrl = `${host}/v2/radar/${latestTime}/256/{z}/{x}/{y}/2/1_1.png`;

                L.tileLayer(radarUrl, {
                    opacity: 0.7,
                    transparent: true,
                    attribution: '© RainViewer'
                }).addTo(map);
                
                console.log("โหลดเรดาร์สำเร็จจาก:", radarUrl);
            })
            .catch(error => {
                console.error('เกิดข้อผิดพลาดในการดึงข้อมูลเรดาร์ฝน:', error);
                alert("ไม่สามารถดึงข้อมูลเรดาร์ฝนได้ในขณะนี้ กรุณาลองใหม่ภายหลัง");
            });
    </script>

</body>
</html>
